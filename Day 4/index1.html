<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main>
        <div>
            <button id="click" class="btn btn-soft btn-primary">
                Click here
            </button> <br> <br>
            <button id="enter" class="btn btn-soft btn-success">
                Mouse Enter
            </button> <br> <br>
            <button id="move" class="btn btn-soft btn-error">
                Mouse Move
            </button> <br> <br>
            <button id="out" class="btn btn-soft btn-info">
                Mouse Out
            </button>
        </div>

        <div class="mt-10">
            <input type="text" name="" id="name" placeholder="Enter your Name"> <br> <br>
            <input type="email" name="" id="email" placeholder="Enter your Email">
        </div>
    </main>
    <script src="./Scripts/script1.js"></script>
</body>

</html>
